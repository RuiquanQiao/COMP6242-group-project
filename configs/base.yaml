seed: 42
device: "auto"
output_dir: "outputs/eurosat_mobilenetv2"
runtime:
  gpu_id: 0

dataset:
  root: "data/eurosat/2750"
  metadata_csv: "data/metadata.csv"
  num_classes: 10
  image_size: 224
  num_workers: 4

training:
  strategy: "linear_probe"  # zero_shot | linear_probe | partial_unfreeze | full_finetune
  partial_blocks: 2
  epochs: 8
  batch_size: 32
  lr: 0.0003
  weight_decay: 0.0001

evaluation:
  split: "test"
